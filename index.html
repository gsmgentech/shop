<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shop</title>

  <link rel="icon" href="img/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

  <meta name="description" content="Shop budget gaming smartphones with reseller pricing support.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="GTServer | Affordable Gaming Smartphones">
  <meta property="og:description" content="Shop budget gaming smartphones with reseller pricing support.">
  <meta property="og:url" content="https://shop.gentechserver.com/">
  <meta property="og:image" content="https://shop.gentechserver.com/preview-v2.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:type" content="image/jpeg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GTServer | Affordable Gaming Smartphones">
  <meta name="twitter:description" content="Shop budget gaming smartphones with reseller pricing support.">
  <meta name="twitter:image" content="https://shop.gentechserver.com/preview.jpg">
</head>

<body>
  <header class="header">
    <img src="img/headergentechservernew1.png" alt="GTServer" id="headerLogo">
  </header>

  <main>
    <h1 id="pageTitle">GTServer Official Store</h1>
    <h2 id="pageSubtitle">Affordable Smartphones with Flexible Payment Options</h2>

    <div class="payment-plan-wrap" id="paymentPlanWrap">
      <button class="payment-plan-btn active" data-plan="cash">Cash</button>
      <button class="payment-plan-btn" data-plan="3">3 Months</button>
      <button class="payment-plan-btn" data-plan="6">6 Months</button>
      <button class="payment-plan-btn" data-plan="12">12 Months</button>
    </div>

    <div class="search-wrap">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search phone model..."
      >
    </div>

    <div class="products" id="productsContainer"></div>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <p class="footer-center">
        &copy; 2026 GTServer. All Rights Reserved.
      </p>
      <span class="footer-update">
        Last updated: Apr 9, 2026
      </span>
    </div>
  </footer>

  <a href="https://m.me/gentechserver"
     target="_blank"
     class="floating-btn"
     aria-label="Chat on Messenger"
     id="messengerBtn">
    <svg xmlns="http://www.w3.org/2000/svg"
         viewBox="0 0 36 36"
         fill="white">
      <path d="M18 0C8.058 0 0 7.372 0 16.464c0 5.172 2.694 9.787 7.118 12.763v6.773l6.529-3.589c1.363.377 2.806.58 4.353.58 9.942 0 18-7.372 18-16.464C36 7.372 27.942 0 18 0zm1.771 22.143l-4.771-5.083-9.829 5.083 10.584-11.314 4.771 5.083 9.829-5.083-10.584 11.314z"/>
    </svg>
  </a>

  <div class="request-modal" id="requestModal">
    <div class="request-modal-content">
      <div class="request-modal-head">
        <h3>Request Unit</h3>
        <button type="button" id="closeRequestModal" class="request-close-btn">&times;</button>
      </div>

      <form id="requestUnitForm" class="request-form" novalidate>
        <input type="hidden" id="requestResellerKey" name="requestResellerKey">
        <input type="hidden" id="requestPageUrl" name="requestPageUrl">

        <div class="request-field">
          <label for="requestBrand">Brand</label>
          <input type="text" id="requestBrand" name="requestBrand">
        </div>

        <div class="request-field">
          <label for="requestModel">Model</label>
          <input type="text" id="requestModel" name="requestModel">
        </div>

        <div class="request-field">
          <label for="requestNotes">Notes</label>
          <textarea id="requestNotes" name="requestNotes" rows="5" placeholder="Preferred variant, payment plan, other details"></textarea>
        </div>

        <button type="submit" class="request-submit-btn" id="requestSubmitBtn">Submit Request</button>
      </form>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="js/script.js?v=4"></script>
  <script src="js/request.js?v=4"></script>
</body>
</html>
